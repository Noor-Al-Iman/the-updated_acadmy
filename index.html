<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="icon" href="favicon3.ico">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أكاديمية التعلّم الممتع</title>
  <!--
    ملف HTML واحد يعمل مباشرة في المتصفح.

    الوصول إلى لوحة الإدارة:
    1. أضف #admin إلى نهاية الرابط الحالي.
    2. أو استخدم الاختصار Ctrl + Alt + A.
    3. كلمة المرور الافتراضية موجودة داخل الثابت ADMIN_PASSWORD في JavaScript.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            cairo: ["Cairo", "sans-serif"],
          },
          colors: {
            kidBlue: "#27D4FF",
            kidYellow: "#FFE45E",
            kidGreen: "#98EC54",
            kidOrange: "#FF9C6E",
            kidPink: "#FF6DB2",
            kidViolet: "#8A92FF",
            kidInk: "#173558",
            kidCream: "#FFF9E8",
          },
          boxShadow: {
            float: "0 28px 80px -34px rgba(23, 53, 88, 0.28)",
            candy: "0 20px 45px -24px rgba(255, 109, 178, 0.32)",
          },
        },
      },
    };
  </script>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="font-cairo antialiased">
  <div class="pointer-events-none fixed inset-0 overflow-hidden">
    <div class="floaty absolute -right-10 top-12 h-32 w-32 rounded-full bg-kidBlue/30 blur-2xl"></div>
    <div class="floaty-delay absolute left-2 top-24 h-40 w-40 rounded-full bg-kidPink/20 blur-2xl"></div>
    <div class="floaty absolute bottom-10 right-1/4 h-36 w-36 rounded-full bg-kidGreen/20 blur-2xl"></div>
  </div>

  <div class="relative z-10 flex min-h-screen flex-col">
    <header class="sticky top-0 z-30 px-4 pt-4 sm:px-6">
      <div class="mx-auto max-w-6xl rounded-[2rem] border border-white/70 bg-white/80 px-4 py-4 shadow-float backdrop-blur">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
          <div class="flex items-center gap-2">
            <button onclick="openAdminRoute()" class="rounded-2xl bg-slate-100 p-3 text-slate-500 transition hover:bg-kidBlue/20 hover:text-sky-700 focus:outline-none focus:ring-4 focus:ring-sky-200" title="لوحة الإدارة">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </button>
            <button
              id="backButton"
              type="button"
              class="hidden rounded-2xl bg-slate-100 px-4 py-3 text-sm font-black text-kidInk transition hover:bg-slate-200 focus:outline-none focus:ring-4 focus:ring-sky-200"
              aria-label="العودة"
            >
              رجوع
            </button>
            <button
              id="homeButton"
              type="button"
              class="hidden rounded-2xl bg-kidBlue/15 px-4 py-3 text-sm font-black text-kidInk transition hover:bg-kidBlue/25 focus:outline-none focus:ring-4 focus:ring-sky-200"
              aria-label="العودة إلى الصفحة الرئيسية"
            >
              الرئيسية
            </button>
          </div>

          <div class="min-w-0 flex-1 text-right">
            <p id="breadcrumb" class="text-xs font-extrabold tracking-wide text-sky-700 sm:text-sm">منصة تعليمية تفاعلية</p>
            <h1 id="pageHeading" class="mt-1 text-lg font-black text-kidInk sm:text-2xl">أهلاً بك في رحلة التعلّم</h1>
          </div>

          <div id="studentBadge" class="hidden"></div>
        </div>
      </div>
    </header>

    <main class="flex-1 px-4 pb-10 pt-6 sm:px-6">
      <div class="mx-auto max-w-6xl">
        <section id="homeView" class="view space-y-8">
          <div class="mx-auto max-w-2xl">
            <div class="relative overflow-hidden rounded-[2rem] bg-gradient-to-br from-kidBlue/35 via-white to-kidYellow/50 p-6 shadow-float">
              <div class="relative flex min-h-[280px] items-center justify-center pt-8">
                <div class="flex h-56 w-56 items-center justify-center rounded-full bg-white/95 shadow-2xl ring-8 ring-white/40">
                  <div class="text-center">
                    <div class="text-6xl">🎓</div>
                    <p class="mt-3 text-xl font-black text-kidInk">لنبدأ الآن</p>
                    <p class="text-sm font-bold text-slate-500">اضغط على الصف المناسب</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="rounded-[2rem] border border-white/60 bg-white/80 p-5 shadow-float sm:p-6">
            <div class="mb-5 flex items-center justify-between gap-4">
              <div>
                <h3 class="text-2xl font-black text-kidInk">الصفوف الدراسية</h3>
                <p class="mt-1 text-sm font-semibold text-slate-500 sm:text-base">اختر الصف المناسب لتظهر لك المواد الخاصة به فقط.</p>
              </div>
            </div>
            <div id="gradesGrid" class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3"></div>
          </div>
        </section>

        <section id="gradeView" class="view hidden"></section>
        <section id="quizView" class="view hidden"></section>
        <section id="adminView" class="view hidden"></section>
      </div>
    </main>

    <footer class="px-4 pb-6 sm:px-6">
      <div class="mx-auto max-w-6xl rounded-[1.75rem] border border-white/70 bg-white/80 px-5 py-4 text-center text-sm font-bold text-slate-600 shadow-sm backdrop-blur">
        Developed by kenana mohamed
      </div>
    </footer>
  </div>

  <div id="studentPromptOverlay" class="hidden fixed inset-0 z-50 items-center justify-center bg-slate-900/50 px-4">
    <div class="relative w-full max-w-md rounded-[2rem] border border-white/70 bg-white p-6 shadow-float">
      <button
        type="button"
        onclick="openAdminRoute()"
        class="absolute left-4 top-4 rounded-[2rem] bg-slate-100 px-3 py-2 text-xs font-black text-slate-500 transition hover:bg-slate-200 hover:text-kidInk focus:outline-none focus:ring-4 focus:ring-slate-200"
      >
        الإدارة
      </button>
      <div class="text-center">
        <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-full bg-kidBlue/15 text-5xl">👋</div>
        <h2 class="mt-4 text-2xl font-black text-kidInk">ما اسمك؟</h2>
        <p class="mt-2 text-sm leading-7 text-slate-500">
          اكتب اسمك مرة واحدة فقط، وسنحتفظ بنقاطك باسمك داخل هذا المتصفح.
        </p>
      </div>
      <label class="mt-5 block">
        <span class="mb-2 block text-sm font-black text-kidInk">اسم الطالب</span>
        <input
          id="studentNameInput"
          type="text"
          class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-base font-bold text-kidInk focus:outline-none focus:ring-4 focus:ring-sky-200"
          placeholder="اكتب اسمك هنا"
          maxlength="40"
        />
      </label>
      <label class="mt-4 block">
        <span class="mb-2 block text-sm font-black text-kidInk">الصف الدراسي</span>
        <select
          id="studentGradeInput"
          class="w-full rounded-[2rem] border border-slate-200 bg-white px-4 py-3 text-base font-bold text-kidInk focus:outline-none focus:ring-4 focus:ring-sky-200"
        >
          <option value="">اختر الصف</option>
          <option value="1">الصف الأول</option>
          <option value="2">الصف الثاني</option>
          <option value="3">الصف الثالث</option>
          <option value="4">الصف الرابع</option>
          <option value="5">الصف الخامس</option>
          <option value="6">الصف السادس</option>
        </select>
      </label>
      <label class="mt-4 block">
        <span class="mb-2 block text-sm font-black text-kidInk">الكود السري</span>
        <input
          id="studentSecretInput"
          type="password"
          class="w-full rounded-[2rem] border border-slate-200 bg-white px-4 py-3 text-base font-bold text-kidInk focus:outline-none focus:ring-4 focus:ring-sky-200"
          placeholder="أدخل الكود المكون من 4 أرقام"
          maxlength="4"
        />
      </label>
      <p id="studentPromptError" class="mt-3 min-h-[1.5rem] text-sm font-black text-rose-600"></p>
      <button
        id="saveStudentNameButton"
        type="button"
        class="mt-2 w-full rounded-2xl bg-kidInk px-5 py-3 text-base font-black text-white transition hover:scale-[1.01] hover:bg-slate-800 focus:outline-none focus:ring-4 focus:ring-slate-200"
      >
        حفظ الاسم والبدء
      </button>
    </div>
  </div>

    <script src="js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/main.js"></script>
</body>
</html>
